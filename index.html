<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infoscreen</title>

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #000; overflow: hidden; font-family: Arial, sans-serif;
    }

    iframe {
      position: fixed; inset: 0; width: 100%; height: 100%;
      border: none; display: block; background: #000; z-index: 1;
    }

    #offlineFallback {
      position: fixed; inset: 0; z-index: 999999;
      display: none; align-items: center; justify-content: center;
      text-align: center;
      background: radial-gradient(circle at center, #10235a 0%, #050b1f 70%, #020715 100%);
      color: #00eaff;
    }

    .offline-card {
      width: 760px; max-width: 80vw; padding: 48px 64px 42px;
      border: 1px solid rgba(0, 234, 255, 0.55);
      border-radius: 18px;
      background: rgba(3, 12, 34, 0.82);
      box-shadow: 0 0 55px rgba(0, 234, 255, 0.35);
    }

    .offline-logo {
      width: 90px; height: 90px; object-fit: contain;
      margin-bottom: 32px;
      filter: drop-shadow(0 0 12px rgba(0, 234, 255, 0.45));
    }

    .offline-title {
      font-size: 34px; line-height: 1.25; font-weight: 900;
      color: #00eaff; margin-bottom: 18px;
    }

    .offline-subtitle {
      font-size: 23px; font-weight: 800; color: #ffffff; margin-bottom: 22px;
    }

    .offline-small {
      font-size: 15px; color: #cfefff; opacity: 0.9; margin-bottom: 26px;
    }

    .offline-last {
      font-size: 13px; color: #9fd9e8; opacity: 0.85; margin-top: 18px;
    }

    .spinner {
      width: 38px; height: 38px; margin: 0 auto;
      border: 4px solid rgba(255,255,255,0.25);
      border-top: 4px solid #00eaff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #debugPanel {
      position: fixed; right: 14px; bottom: 14px; z-index: 1000000;
      display: none; gap: 8px; background: rgba(0,0,0,.55);
      padding: 10px; border-radius: 12px;
      border: 1px solid rgba(0,234,255,.4);
    }

    #debugPanel button {
      border: none; border-radius: 9px; padding: 9px 12px;
      font-weight: 800; cursor: pointer;
      background: #00eaff; color: #06122b;
    }

    #statusDebug {
      position: fixed; left: 14px; bottom: 14px; z-index: 1000001;
      display: none; max-width: 560px;
      background: rgba(0,0,0,.78); color: #00eaff;
      border: 1px solid rgba(0,234,255,.55);
      border-radius: 12px; padding: 12px 14px;
      font-size: 13px; line-height: 1.45; text-align: left;
      font-family: Consolas, monospace; word-break: break-all;
    }
  </style>
</head>

<body>

  <iframe
    id="infoscreenFrame"
    src="https://script.google.com/macros/s/AKfycbyz3vOu_V_gPCZTkEpWZor5UjbqDFvnbWVW0OhXY8_Mz1w8LwsHhCHRD1gfeCv7cwmAxg/exec">
  </iframe>

  <div id="offlineFallback">
    <div class="offline-card">
      <img class="offline-logo"
        src="https://drive.google.com/thumbnail?id=11OnUfELMcLBj_VPiqKXqu1nIAZHXg_Pb&sz=w400"
        alt="Feuerwehr St. Pölten Stadt">

      <div class="offline-title">Derzeit gibt es<br>Verbindungsschwierigkeiten.</div>
      <div class="offline-subtitle">Wir arbeiten bereits an der Problembehebung.</div>
      <div class="offline-small">Die Anzeige wird automatisch wiederhergestellt, sobald die Verbindung verfügbar ist.</div>
      <div class="spinner"></div>
      <div class="offline-last" id="lastOnlineText">Letzte erfolgreiche Verbindung: wird geprüft …</div>
    </div>
  </div>

  <div id="debugPanel">
    <button onclick="showOfflineTest()">Offline testen</button>
    <button onclick="endOfflineTest()">Zurück</button>
    <button onclick="reloadFrame()">Neu laden</button>
    <button onclick="checkGlobalFallbackStatus()">Status prüfen</button>
  </div>

  <div id="statusDebug">Statusdiagnose wird geladen …</div>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbyz3vOu_V_gPCZTkEpWZor5UjbqDFvnbWVW0OhXY8_Mz1w8LwsHhCHRD1gfeCv7cwmAxg/exec";
    const GLOBAL_STATUS_URL = "https://michaelmejtsky.github.io/FFSTP-Status/status.json";

    const frame = document.getElementById("infoscreenFrame");
    const fallback = document.getElementById("offlineFallback");
    const lastOnlineText = document.getElementById("lastOnlineText");
    const debugPanel = document.getElementById("debugPanel");
    const statusDebug = document.getElementById("statusDebug");

    let offlineTestMode = false;
    let globalFallbackActive = false;
    let debugMode = false;
    let lastOnline = new Date();

    function formatTime(date) {
      return date.toLocaleString("de-AT", {
        day: "2-digit", month: "2-digit", year: "numeric",
        hour: "2-digit", minute: "2-digit", second: "2-digit"
      }) + " Uhr";
    }

    function updateLastOnlineText() {
      lastOnlineText.textContent = "Letzte erfolgreiche Verbindung: " + formatTime(lastOnline);
    }

    function showOffline() {
      fallback.style.display = "flex";
      frame.style.display = "none";
      updateLastOnlineText();
    }

    function hideOffline() {
      if (offlineTestMode || globalFallbackActive) return;
      fallback.style.display = "none";
      frame.style.display = "block";
      lastOnline = new Date();
      updateLastOnlineText();
    }

    function reloadFrame() {
      if (offlineTestMode || globalFallbackActive) return;
      frame.style.display = "block";
      frame.src = APP_URL + "?t=" + Date.now();
    }

    function showOfflineTest() {
      offlineTestMode = true;
      showOffline();
    }

    function endOfflineTest() {
      offlineTestMode = false;
      globalFallbackActive = false;
      fallback.style.display = "none";
      frame.style.display = "block";
      lastOnline = new Date();
      updateLastOnlineText();
      reloadFrame();
    }

    function setDebug(text) {
      if (!debugMode) return;
      statusDebug.style.display = "block";
      statusDebug.innerHTML = text;
    }

    async function checkGlobalFallbackStatus() {
      const url = GLOBAL_STATUS_URL + "?nocache=" + Date.now();

      try {
        setDebug("Prüfe Status…<br>URL: " + url);

        const response = await fetch(url, { cache: "no-store" });
        const text = await response.text();
        const lower = text.toLowerCase();

        const fallbackIsTrue = lower.includes("fallback") && lower.includes("true");

        setDebug(
          "HTTP: " + response.status + "<br>" +
          "fallback erkannt: " + fallbackIsTrue + "<br>" +
          "globalFallbackActive: " + globalFallbackActive + "<br>" +
          "offlineTestMode: " + offlineTestMode + "<br>" +
          "Antwort:<br>" + text.replace(/</g, "&lt;").replace(/>/g, "&gt;")
        );

        if (fallbackIsTrue) {
          globalFallbackActive = true;
          showOffline();
          return;
        }

        globalFallbackActive = false;

        if (!offlineTestMode && navigator.onLine) {
          fallback.style.display = "none";
          frame.style.display = "block";
          lastOnline = new Date();
          updateLastOnlineText();
        }

      } catch (err) {
        setDebug("Fetch Fehler:<br>" + String(err));
        console.log("Globaler Status konnte nicht geprüft werden:", err);
      }
    }

    frame.addEventListener("load", function () {
      setTimeout(hideOffline, 1200);
    });

    window.addEventListener("offline", showOffline);

    window.addEventListener("online", function () {
      reloadFrame();
      setTimeout(hideOffline, 3000);
    });

    setInterval(function () {
      if (!navigator.onLine) showOffline();
    }, 5000);

    setInterval(function () {
      if (navigator.onLine && !offlineTestMode && !globalFallbackActive) reloadFrame();
    }, 60000);

    setInterval(checkGlobalFallbackStatus, 3000);

    const params = new URLSearchParams(window.location.search);

    if (params.has("debug") || params.get("debug") === "1") {
      debugMode = true;
      debugPanel.style.display = "flex";
      statusDebug.style.display = "block";
    }

    if (params.has("offline") || params.has("testoffline") || params.get("test") === "offline") {
      showOfflineTest();
    }

    updateLastOnlineText();
    checkGlobalFallbackStatus();
  </script>

</body>
</html>
